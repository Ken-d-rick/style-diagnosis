<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Style Diagnosis | Ken'drick</title>
<meta name="description" content="7つの問いが、あなたの奥にあるものを掘り出す。Ken'drickのスタイル診断。">
<meta property="og:title" content="Style Diagnosis | Ken'drick">
<meta property="og:description" content="7つの問いが、あなたの奥にあるものを掘り出す。Ken'drickのスタイル診断。">
<meta property="og:image" content="https://baseec-img-mng.akamaized.net/images/user/logo/c1e04b159051b4538cbf9476fa0cd825.png?imformat=generic&q=90&im=Resize,width=1200,height=1200,aspect=fit,type=normal;Crop,width=1200,height=1200,gravity=Center,allowExpansion">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0b0c0d;
    --bg-1:#15171a;
    --text:#e5e5e5;
    --text-muted:#8c8c8c;
    --text-dim:#525457;
    --line:#2a2c2f;
    --accent:#7e9a8a;
    --accent-dim:rgba(126,154,138,0.28);
    --serif:'Shippori Mincho', serif;
    --sans:'Noto Sans JP', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-0);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:var(--text);}
  button{font-family:inherit;}

  .depth-overlay{
    position:fixed; inset:0;
    background:radial-gradient(circle at 50% 28%, transparent 0%, #000 115%);
    opacity:0;
    transition:opacity 1.4s ease;
    pointer-events:none;
    z-index:0;
  }

  .stage{
    position:relative;
    z-index:1;
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    padding:0 28px 80px;
    display:flex;
    flex-direction:column;
  }

  .brandbar{
    padding:28px 0 18px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
  }
  .brandbar .name{font-family:var(--serif); font-size:15px; letter-spacing:0.08em;}
  .brandbar .tag{font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:0.12em;}

  .screen{display:none; flex:1; flex-direction:column;}
  .screen.active{display:flex;}

  /* ---- intro ---- */
  #screen-intro{justify-content:center; align-items:center; text-align:center; padding-top:40px; gap:28px;}
  .eye{width:64px; height:64px;}
  .eye svg{width:100%; height:100%;}
  .eye .pupil{transform-origin:32px 32px; animation:blink 7.5s infinite;}
  @keyframes blink{
    0%,95%{transform:scaleY(1);}
    97%{transform:scaleY(0.05);}
    100%{transform:scaleY(1);}
  }
  @media (prefers-reduced-motion:reduce){
    .eye .pupil{animation:none;}
  }
  #screen-intro h1{
    font-family:var(--serif);
    font-weight:600;
    font-size:30px;
    line-height:1.5;
    margin:0;
  }
  #screen-intro p.lead{
    color:var(--text-muted);
    font-size:14px;
    line-height:1.9;
    margin:0;
    max-width:340px;
  }
  .start-btn{
    margin-top:8px;
    background:transparent;
    border:1px solid var(--accent-dim);
    color:var(--text);
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.14em;
    padding:16px 36px;
    cursor:pointer;
    transition:border-color .3s, background .3s;
  }
  .start-btn:hover, .start-btn:focus-visible{
    border-color:var(--accent);
    background:var(--accent-dim);
  }
  .start-hint{font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:0.1em;}

  /* ---- quiz ---- */
  #screen-quiz{padding-top:36px; gap:22px;}
  .progress-track{height:1px; background:var(--line); position:relative; width:100%;}
  .progress-fill{height:1px; background:var(--accent); width:0%; transition:width .5s ease;}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.16em; color:var(--text-dim); margin:0;}
  .question{
    font-family:var(--serif);
    font-size:23px;
    line-height:1.7;
    font-weight:500;
    margin:0;
    min-height:2.2em;
  }
  .options{display:flex; flex-direction:column; gap:0; border-top:1px solid var(--line);}
  .option{
    text-align:left;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--line);
    color:var(--text);
    font-family:var(--sans);
    font-size:14.5px;
    line-height:1.6;
    padding:18px 4px 18px 16px;
    cursor:pointer;
    position:relative;
    transition:padding-left .25s, color .25s, background .25s;
  }
  .option::before{
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:2px;
    background:var(--accent);
    transform:scaleY(0);
    transform-origin:center;
    transition:transform .25s ease;
  }
  .option:hover, .option:focus-visible{
    padding-left:22px;
    background:rgba(255,255,255,0.02);
  }
  .option:hover::before, .option:focus-visible::before{transform:scaleY(1);}
  .option:focus-visible{outline:1px solid var(--accent); outline-offset:-1px;}

  /* ---- result ---- */
  #screen-result{padding-top:36px; gap:0;}
  .result-eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:0.18em; color:var(--accent); margin:0 0 18px;}
  .result-eye{margin-bottom:22px;}
  .result-title{font-family:var(--serif); font-size:13px; color:var(--text-muted); margin:0 0 6px; letter-spacing:.05em;}
  .result-name{font-family:var(--serif); font-size:34px; font-weight:800; margin:0 0 22px; line-height:1.4;}
  .result-name .en{display:block; font-family:var(--mono); font-size:11px; color:var(--text-dim); font-weight:400; letter-spacing:.18em; margin-top:8px;}
  .result-desc{font-size:14.5px; line-height:2; color:var(--text); margin:0 0 36px; border-left:1px solid var(--accent-dim); padding-left:18px;}

  .rec-label{font-family:var(--mono); font-size:11px; letter-spacing:.14em; color:var(--text-dim); margin:0 0 14px; border-top:1px solid var(--line); padding-top:28px;}
  .rec-list{display:flex; flex-direction:column; gap:1px; margin-bottom:40px;}
  .rec-item{
    display:flex; justify-content:space-between; align-items:center; gap:14px;
    border-bottom:1px solid var(--line);
    padding:18px 0;
    text-decoration:none;
    transition:padding-left .25s;
  }
  .rec-item:hover, .rec-item:focus-visible{padding-left:8px;}
  .rec-main{display:flex; flex-direction:column; gap:6px;}
  .rec-name{font-family:var(--serif); font-size:16px;}
  .rec-desc{font-size:12px; color:var(--text-muted); line-height:1.6; max-width:300px;}
  .rec-side{display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0;}
  .rec-price{font-family:var(--mono); font-size:13px; color:var(--text);}
  .rec-go{font-family:var(--mono); font-size:10px; color:var(--accent); letter-spacing:.1em;}

  .share-label{font-family:var(--mono); font-size:11px; letter-spacing:.14em; color:var(--text-dim); margin:0 0 14px;}
  .share-row{display:flex; gap:10px; margin-bottom:46px;}
  .share-btn{
    flex:1; text-align:center;
    border:1px solid var(--line);
    color:var(--text-muted);
    font-family:var(--mono); font-size:11px; letter-spacing:.08em;
    padding:14px 6px;
    text-decoration:none;
    transition:border-color .25s, color .25s;
  }
  .share-btn:hover, .share-btn:focus-visible{border-color:var(--accent); color:var(--text);}

  .more-row{display:flex; flex-direction:column; gap:14px; align-items:center; border-top:1px solid var(--line); padding-top:32px;}
  .more-link{font-family:var(--mono); font-size:11px; letter-spacing:.1em; color:var(--text-muted); text-decoration:none;}
  .more-link:hover{color:var(--text);}
  .retry-btn{background:none; border:none; color:var(--text-dim); font-family:var(--mono); font-size:10px; letter-spacing:.1em; cursor:pointer; margin-top:10px; text-decoration:underline;}

  footer.site-footer{
    text-align:center; padding:30px 0 18px;
    font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:.1em;
  }
</style>
</head>
<body>

<div class="depth-overlay" id="depthOverlay"></div>

<main class="stage">

  <div class="brandbar">
    <span class="name">Ken'drick</span>
    <span class="tag">STYLE DIAGNOSIS</span>
  </div>

  <!-- INTRO -->
  <section id="screen-intro" class="screen active">
    <div class="eye">
      <svg viewBox="0 0 64 64" fill="none">
        <ellipse cx="32" cy="32" rx="30" ry="14" stroke="#525457" stroke-width="1"/>
        <circle class="pupil" cx="32" cy="32" r="8" fill="#7e9a8a"/>
      </svg>
    </div>
    <h1>7つの問いが、<br>あなたの奥にあるものを<br>掘り出す。</h1>
    <p class="lead">直感で答えてください。考え込む必要はありません。<br>最初に浮かんだものが、たいてい正解です。</p>
    <button class="start-btn" id="startBtn">診断をはじめる</button>
    <span class="start-hint">7 QUESTIONS / 約2分</span>
  </section>

  <!-- QUIZ -->
  <section id="screen-quiz" class="screen">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <p class="eyebrow" id="depthLabel">DEPTH 01/07</p>
    <h2 class="question" id="questionText"></h2>
    <div class="options" id="optionsList"></div>
  </section>

  <!-- RESULT -->
  <section id="screen-result" class="screen">
    <p class="result-eyebrow">RESULT</p>
    <div class="eye result-eye">
      <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
        <ellipse cx="32" cy="32" rx="30" ry="14" stroke="#525457" stroke-width="1"/>
        <circle class="pupil" cx="32" cy="32" r="8" fill="#7e9a8a"/>
      </svg>
    </div>
    <p class="result-title">あなたの中に在ったのは——</p>
    <h2 class="result-name" id="resultName"></h2>
    <p class="result-desc" id="resultDesc"></p>

    <p class="rec-label">RECOMMENDED ITEM</p>
    <div class="rec-list" id="recList"></div>

    <p class="share-label">SHARE YOUR RESULT</p>
    <div class="share-row">
      <a class="share-btn" id="shareX" target="_blank" rel="noopener">X でポスト</a>
      <a class="share-btn" id="shareLine" target="_blank" rel="noopener">LINEで送る</a>
      <a class="share-btn" id="shareFb" target="_blank" rel="noopener">シェア</a>
    </div>

    <div class="more-row">
      <a class="more-link" href="https://kendrick.base.shop/items/all" target="_blank" rel="noopener">全アイテムを見る →</a>
      <a class="more-link" href="https://www.instagram.com/kendrick_apostrophe/" target="_blank" rel="noopener">Instagramをフォローする →</a>
      <button class="retry-btn" id="retryBtn">もう一度診断する</button>
    </div>
  </section>

</main>

<footer class="site-footer">DESIGNED FOR KEN'DRICK / <a href="https://kendrick.base.shop/" style="color:inherit;">kendrick.base.shop</a></footer>

<script>
/* =====================================================================
   商品データ — 新作の追加や価格変更があれば、ここを書き換えるだけでOK。
   url は BASE の商品ページのリンクです。
===================================================================== */
const TYPES = {
  A: {
    name: '深淵', en: 'THE ABYSS',
    desc: '海より深く、宇宙より遠い場所に、あなたの感覚はすでに触れている。落ち着いて見えるのは、もう怖がるものがないからだ。',
    items: [
      { name: 'Yog-Sothoth', price: '¥4,000', desc: '虹色の球体の集積をイメージ。', url: 'https://kendrick.base.shop/items/133074115' },
      { name: 'Shoggoth', price: '¥7,000', desc: '着回しやすいスウェット・パーカー。', url: 'https://kendrick.base.shop/items/134100680' }
    ]
  },
  B: {
    name: '論理', en: 'THE LOGIC',
    desc: 'あなたは世界を、実行可能な手順として見ている。曖昧さは、まだ最適化されていないだけのことだ。',
    items: [
      { name: '★を手に入れる', price: '¥5,000', desc: '記号とプログラミングをモチーフにしたシリーズ。', url: 'https://kendrick.base.shop/items/133615921' },
      { name: '♥を実行する', price: '¥5,000', desc: '記号とプログラミングをモチーフにしたシリーズ。', url: 'https://kendrick.base.shop/items/133073633' }
    ]
  },
  C: {
    name: '違和感', en: 'THE UNCANNY',
    desc: '誰も気づいていない記号に、あなただけが気づいている。それは偶然ではない。',
    items: [
      { name: '三角形と目', price: '¥4,000', desc: '朝起きると壁にこのマークが書いてあった。', url: 'https://kendrick.base.shop/items/133071560' },
      { name: '魚', price: '¥3,000', desc: 'ブランド名をアレンジした魚のような記号を刺繍。', url: 'https://kendrick.base.shop/items/135662153' }
    ]
  },
  D: {
    name: '裂け目', en: 'EVERYDAY RIFT',
    desc: 'いつもの食卓に、少しだけ説明のつかないものが混ざっている。あなたはそれに気づいて、なお楽しんでいる。',
    items: [
      { name: 'メロンとワイン', price: '¥7,000', desc: 'メロンとワインを描いた長袖シャツ。', url: 'https://kendrick.base.shop/items/133964294' },
      { name: '檸檬の日々', price: '¥6,000', desc: 'レモンと1週間をモチーフにしたイラスト。', url: 'https://kendrick.base.shop/items/135348731' }
    ]
  },
  E: {
    name: '核', en: 'THE CORE',
    desc: '私は私である。それ以上の証明を、あなたは必要としない。',
    items: [
      { name: "I'm I", price: '¥4,000', desc: '私は私である。', url: 'https://kendrick.base.shop/items/134061430' },
      { name: '波と雲', price: '¥7,000', desc: '下に空、上に波。上下逆の構造。', url: 'https://kendrick.base.shop/items/137038874' }
    ]
  },
  F: {
    name: '鍵', en: 'THE ICON',
    desc: 'あなたが選ぶのは、説明の要らない定番。鍵を持つ者だけが、その先へ進める。',
    items: [
      { name: '鍵', price: '¥7,000', desc: 'ブランド名と鍵をイメージ。', url: 'https://kendrick.base.shop/items/137008634' },
      { name: 'バケットハット', price: '¥4,000', desc: 'ブランド名を刺繍したバケットハット。', url: 'https://kendrick.base.shop/items/133121076' }
    ]
  }
};

const QUESTIONS = [
  { q: '深夜2時、ふと目が覚めた。最初に頭をよぎるのは？', opts: [
    ['宇宙の果てはどうなっているんだろう','A'], ['さっきまでの作業、続きをやりたい','B'],
    ['誰かに見られている気がする','C'], ['お腹が空いた','D'],
    ['私は今、ここにいる。それだけで十分だ','E'], ['鍵、ちゃんと閉めたっけ','F']
  ]},
  { q: '街を歩いていて、思わず立ち止まる風景は？', opts: [
    ['廃墟の奥で何かがうごめいている','A'], ['整然と並んだビルの、コードのような窓','B'],
    ['誰も気づいていない壁の落書き','C'], ['屋台から漂ってくる匂い','D'],
    ['鏡張りのエレベーターに映る、もう一人の自分','E'], ['古い鍵屋の、年季の入った看板','F']
  ]},
  { q: '友人にあだ名をつけるなら？', opts: [
    ['深海','A'], ['アルゴリズム','B'], ['目','C'], ['日曜日','D'], ['分身','E'], ['南京錠','F']
  ]},
  { q: 'SNSで思わず保存してしまう投稿は？', opts: [
    ['宇宙のCG映像','A'], ['美しく整理されたコードのスクリーンショット','B'],
    ['不気味な都市伝説の考察スレッド','C'], ['丁寧に盛り付けられた食卓の写真','D'],
    ['刺さる一文の引用','E'], ['ミニマルなロゴデザインの作例','F']
  ]},
  { q: '一番、心が落ち着く時間は？', opts: [
    ['誰もいない夜の海辺','A'], ['何かに集中して「実行」している時','B'],
    ['違和感の正体を、ひとりで探っている時','C'], ['好きな食べ物を選んでいる時','D'],
    ['一人で考え込んでいる時','E'], ['決まった日課を、順番にこなしている時','F']
  ]},
  { q: '服に刺繍を1つだけ入れられるとしたら？', opts: [
    ['虹色の球体','A'], ['コマンドのような矢印や記号','B'], ['三角形と、ひとつの目','C'],
    ['好きな果物','D'], ['自分の名前','E'], ['鍵のシルエット','F']
  ]},
  { q: '今のあなたを一言で表すと？', opts: [
    ['混沌の中の静寂','A'], ['最適化された自分','B'], ['説明のつかない予感','C'],
    ['ささやかな満足','D'], ['変わらない核','E'], ['揺るがない軸','F']
  ]}
];

/* ===================================================================== */

const TYPE_ORDER = ['A','B','C','D','E','F'];
let currentQ = 0;
const scores = { A:0, B:0, C:0, D:0, E:0, F:0 };

const screens = {
  intro: document.getElementById('screen-intro'),
  quiz: document.getElementById('screen-quiz'),
  result: document.getElementById('screen-result')
};
const depthOverlay = document.getElementById('depthOverlay');

function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

function renderQuestion(){
  const total = QUESTIONS.length;
  const data = QUESTIONS[currentQ];
  document.getElementById('depthLabel').textContent = `DEPTH ${String(currentQ+1).padStart(2,'0')}/${String(total).padStart(2,'0')}`;
  document.getElementById('questionText').textContent = data.q;
  document.getElementById('progressFill').style.width = `${(currentQ/total)*100}%`;
  depthOverlay.style.opacity = (currentQ/total) * 0.55;

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  data.opts.forEach(([label, type]) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = label;
    btn.addEventListener('click', () => selectAnswer(type));
    list.appendChild(btn);
  });
}

function selectAnswer(type){
  scores[type] += 1;
  currentQ += 1;
  if (currentQ >= QUESTIONS.length){
    showResult();
  } else {
    renderQuestion();
  }
}

function getResultType(){
  let best = TYPE_ORDER[0];
  TYPE_ORDER.forEach(t => { if (scores[t] > scores[best]) best = t; });
  return best;
}

function showResult(){
  document.getElementById('progressFill').style.width = '100%';
  depthOverlay.style.opacity = 0.65;

  const typeKey = getResultType();
  const type = TYPES[typeKey];

  document.getElementById('resultName').innerHTML = `${type.name}<span class="en">${type.en}</span>`;
  document.getElementById('resultDesc').textContent = type.desc;

  const recList = document.getElementById('recList');
  recList.innerHTML = '';
  type.items.forEach(item => {
    const a = document.createElement('a');
    a.className = 'rec-item';
    a.href = item.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `
      <div class="rec-main">
        <span class="rec-name">${item.name}</span>
        <span class="rec-desc">${item.desc}</span>
      </div>
      <div class="rec-side">
        <span class="rec-price">${item.price}</span>
        <span class="rec-go">見る →</span>
      </div>`;
    recList.appendChild(a);
  });

  const shareText = `診断結果：私は「${type.name}（${type.en}）」タイプでした。 #Kendrick診断`;
  const pageUrl = 'https://ken-d-rick.github.io/style-diagnosis/';
  document.getElementById('shareX').href = `https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(pageUrl)}`;
  document.getElementById('shareLine').href = `https://line.me/R/msg/text/?${encodeURIComponent(shareText + ' ' + pageUrl)}`;
  document.getElementById('shareFb').href = `https://www.facebook.com/sharer.php?u=${encodeURIComponent(pageUrl)}`;

  showScreen('result');
}

function resetQuiz(){
  currentQ = 0;
  TYPE_ORDER.forEach(t => scores[t] = 0);
  depthOverlay.style.opacity = 0;
  showScreen('intro');
}

document.getElementById('startBtn').addEventListener('click', () => {
  renderQuestion();
  showScreen('quiz');
});
document.getElementById('retryBtn').addEventListener('click', resetQuiz);
</script>
</body>
</html>
