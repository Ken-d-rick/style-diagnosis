<html lang="ja">

<meta charset="UTF-8">

<title>Ken'drick Style Diagnosis</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafafa;
    --text: #111;
    --sub: #666;
    --line: #e5e5e5;
    --accent: #000;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 32px;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--sub);
    margin-bottom: 12px;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 14px;
    color: var(--sub);
  }
  /* Start screen */
  .start-screen {
    text-align: center;
    padding: 24px 0;
  }
  .start-screen p {
    font-size: 15px;
    color: var(--sub);
    margin-bottom: 32px;
    line-height: 2;
  }
  .start-screen .lead {
    font-size: 17px;
    color: var(--text);
    margin-bottom: 16px;
  }
  /* Buttons */
  .btn {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    padding: 14px 40px;
    font-size: 14px;
    letter-spacing: 0.2em;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .btn:hover { background: #fff; color: var(--accent); }
  .btn-outline {
    background: transparent;
    color: var(--accent);
  }
  .btn-outline:hover { background: var(--accent); color: #fff; }
  /* Progress */
  .progress-wrap {
    margin-bottom: 32px;
  }
  .progress-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--sub);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 2px;
    background: var(--line);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
    width: 0%;
  }
  /* Questions */
  .question {
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 28px;
    line-height: 1.5;
    letter-spacing: 0.02em;
  }
  .q-num {
    font-size: 12px;
    color: var(--sub);
    letter-spacing: 0.25em;
    margin-bottom: 8px;
    display: block;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .option {
    border: 1px solid var(--line);
    background: #fff;
    padding: 18px 24px;
    text-align: left;
    cursor: pointer;
    font-size: 15px;
    font-family: inherit;
    transition: all 0.2s ease;
    color: var(--text);
    line-height: 1.5;
  }
  .option:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .nav-actions {
    margin-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .back-btn {
    background: transparent;
    border: none;
    color: var(--sub);
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.15em;
    font-family: inherit;
    padding: 8px 0;
  }
  .back-btn:hover { color: var(--accent); }
  .back-btn:disabled { opacity: 0; pointer-events: none; }
  /* Result */
  .result {
    animation: fadeIn 0.6s ease;
  }
  .result-intro {
    text-align: center;
    margin-bottom: 48px;
  }
  .result-intro .label {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--sub);
    margin-bottom: 12px;
  }
  .result-intro h2 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }
  .result-intro .type-name {
    display: inline-block;
    border: 1px solid var(--accent);
    padding: 8px 20px;
    font-size: 14px;
    letter-spacing: 0.15em;
    margin: 16px 0;
  }
  .result-intro p {
    color: var(--sub);
    font-size: 14px;
    margin: 16px auto 0;
    max-width: 520px;
    line-height: 2;
  }
  .product-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    margin-top: 32px;
  }
  @media (min-width: 600px) {
    .product-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }
  .product-card {
    background: #fff;
    border: 1px solid var(--line);
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
    display: block;
    overflow: hidden;
  }
  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  }
  .product-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: #f0f0f0;
    display: block;
  }
  .product-info {
    padding: 16px;
  }
  .product-rank {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--sub);
    margin-bottom: 4px;
  }
  .product-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .product-price {
    font-size: 13px;
    color: var(--sub);
  }
  .result-actions {
    margin-top: 48px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  .shop-link {
    font-size: 13px;
    color: var(--sub);
    letter-spacing: 0.2em;
    text-decoration: none;
    border-bottom: 1px solid var(--sub);
    padding-bottom: 2px;
  }
  .shop-link:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  footer {
    text-align: center;
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--sub);
  }
</style>

    options: [
      { label: "早朝（AM5:00）", tags: ["space","simple","music"] },
      { label: "真昼", tags: ["food","pop","nature"] },
      { label: "夕方", tags: ["urban","art"] },
      { label: "深夜", tags: ["mystery","dark","music"] }
    ]
  },
  {
    q: "理想の休日の過ごし方は？",
    options: [
      { label: "本や映画に没頭する", tags: ["mystery","art"] },
      { label: "美味しいものを食べに出かける", tags: ["food"] },
      { label: "音楽を聴いたり何かを作ったり", tags: ["music","tech","art"] },
      { label: "街や自然をぶらぶら散歩", tags: ["urban","nature"] }
    ]
  }
];

// ============ Type Definitions ============
const types = {
  mystery: { name: "MYSTIC EXPLORER", desc: "神話と闇の世界に惹かれる、深く静かなあなた。" },
  dark:    { name: "MYSTIC EXPLORER", desc: "ダークで神秘的な美しさに惹かれる、内省的なあなた。" },
  monster: { name: "MYTHOS WANDERER", desc: "怪奇と幻想の世界を愛する、独自の感性を持つあなた。" },
  food:    { name: "GOURMET LOVER", desc: "美味しいものと楽しい時間を愛する、人生を満喫するタイプ。" },
  pop:     { name: "POP ICON", desc: "明るくユーモアたっぷり。周りを楽しい気分にさせる存在。" },
  tech:    { name: "DIGITAL THINKER", desc: "理性的でクール。技術と論理の美しさを知っているあなた。" },
  space:   { name: "COSMIC DREAMER", desc: "宇宙の広がりに想いを馳せる、夢見がちで知的な人。" },
  urban:   { name: "CITY DRIFTER", desc: "都市の空気が似合う、洗練されたミニマリスト。" },
  nature:  { name: "NATURE SOUL", desc: "自然と海に心惹かれる、穏やかで感性豊かなあなた。" },
  heart:   { name: "HEART ROMANTIC", desc: "感情と愛を大切にする、ロマンチストなあなた。" },
  music:   { name: "RHYTHM SEEKER", desc: "音楽が日常にある、リズムと共に生きるタイプ。" },
  art:     { name: "ART INDIVIDUALIST", desc: "個性とアートを愛する、自分のスタイルを持つ人。" },
  simple:  { name: "MINIMAL PURIST", desc: "シンプルの中にある美しさを知る、洗練された感性。" }
};

// ============ App Logic ============
const app = document.getElementById('app');
let currentQ = 0;
const answers = [];

function startScreen() {
  app.innerHTML = `
    <div class="start-screen">
      <p class="lead">あなたにぴったりの一枚を見つけます。</p>
      <p>7つの質問に答えるだけで、<br>Ken'drickの54デザインの中から<br>あなたに似合う3着をおすすめします。</p>
      <button class="btn" id="startBtn">START</button>
    </div>
  `;
  document.getElementById('startBtn').addEventListener('click', () => {
    currentQ = 0;
    answers.length = 0;
    renderQuestion();
  });
}

function renderQuestion() {
  const q = questions[currentQ];
  const progress = ((currentQ) / questions.length) * 100;
  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-label">
        <span>QUESTION ${currentQ + 1} / ${questions.length}</span>
        <span>${Math.round(progress)}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="question">
      <span class="q-num">Q${String(currentQ + 1).padStart(2,'0')}</span>
      <h2>${q.q}</h2>
      <div class="options">
        ${q.options.map((opt, i) => `<button class="option" data-i="${i}">${opt.label}</button>`).join('')}
      </div>
      <div class="nav-actions">
        <button class="back-btn" id="backBtn" ${currentQ === 0 ? 'disabled' : ''}>← BACK</button>
        <span style="font-size:11px;letter-spacing:0.2em;color:var(--sub);">SELECT ONE</span>
      </div>
    </div>
  `;
  document.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.i);
      answers[currentQ] = q.options[i].tags;
      currentQ++;
      if (currentQ >= questions.length) {
        renderResult();
      } else {
        renderQuestion();
      }
    });
  });
  document.getElementById('backBtn').addEventListener('click', () => {
    if (currentQ > 0) {
      currentQ--;
      renderQuestion();
    }
  });
}

function renderResult() {
  // Tally tag scores
  const tagScores = {};
  answers.forEach(tags => {
    tags.forEach(t => { tagScores[t] = (tagScores[t] || 0) + 1; });
  });

  // Score each product based on tag overlap
  const scoredProducts = products.map(p => {
    let score = 0;
    p.tags.forEach(t => { if (tagScores[t]) score += tagScores[t]; });
    return { ...p, score };
  });
  scoredProducts.sort((a, b) => b.score - a.score);

  // Pick top 3 (with some shuffle among ties)
  const top = scoredProducts.slice(0, 3);

  // Determine user type from highest scoring tag
  const topTag = Object.keys(tagScores).sort((a,b) => tagScores[b] - tagScores[a])[0];
  const type = types[topTag] || types.simple;

  // Progress to 100%
  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-label">
        <span>RESULT</span>
        <span>100%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
    </div>
    <div class="result">
      <div class="result-intro">
        <div class="label">YOUR TYPE</div>
        <h2>あなたは</h2>
        <div class="type-name">${type.name}</div>
        <p>${type.desc}</p>
        <p style="margin-top:24px;">この感性に響く3着を選びました。</p>
      </div>
      <div class="product-grid">
        ${top.map((p, i) => `
          <a class="product-card" href="https://kendrick.base.shop/items/${p.id}" target="_blank" rel="noopener">
            <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
            <div class="product-info">
              <div class="product-rank">PICK ${String(i + 1).padStart(2,'0')}</div>
              <div class="product-name">${p.name}</div>
              <div class="product-price">¥${p.price}</div>
            </div>
          </a>
        `).join('')}
      </div>
      <div class="result-actions">
        <button class="btn btn-outline" id="retryBtn">もう一度診断する</button>
        <a class="shop-link" href="https://kendrick.base.shop/" target="_blank" rel="noopener">VISIT KEN'DRICK SHOP →</a>
      </div>
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => {
    startScreen();
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initial render
startScreen();
</script>
</body>
</html>
